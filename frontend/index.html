<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playlist Recommender</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1e1e1e;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.15);
      --text: #f0f0f0;
      --text-muted: #888;
      --text-dim: #555;
      --accent: #c8f45a;
      --accent-dim: rgba(200,244,90,0.12);
      --accent-text: #0a0a0a;
      --radius: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .noise {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 200px;
      opacity: 0.6;
    }

    .container {
      position: relative; z-index: 1;
      max-width: 680px; margin: 0 auto;
    }

    header { margin-bottom: 3rem; }
    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px; font-weight: 300;
      color: var(--accent); letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 10px;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800; line-height: 1.05;
      letter-spacing: -0.03em; color: var(--text);
    }
    h1 span { color: var(--accent); }
    .tagline {
      margin-top: 10px; font-size: 14px;
      color: var(--text-muted); font-weight: 400; letter-spacing: 0.01em;
    }

    .section { margin-bottom: 1.75rem; }
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px; font-weight: 400; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-dim);
      margin-bottom: 10px;
    }

    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip {
      padding: 7px 15px; border-radius: 999px;
      border: 1px solid var(--border);
      font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 400;
      color: var(--text-muted); background: transparent;
      cursor: pointer; transition: all 0.15s ease;
      user-select: none;
    }
    .chip:hover { border-color: var(--border-hover); color: var(--text); }
    .chip.active {
      background: var(--accent); border-color: var(--accent);
      color: var(--accent-text); font-weight: 700;
    }

    .gen-btn {
      width: 100%; padding: 14px;
      background: var(--accent); border: none; border-radius: var(--radius);
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
      color: var(--accent-text); cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.15s, transform 0.1s;
    }
    .gen-btn:hover:not(:disabled) { opacity: 0.9; }
    .gen-btn:active:not(:disabled) { transform: scale(0.99); }
    .gen-btn:disabled {
      background: var(--surface-2); color: var(--text-dim);
      cursor: not-allowed;
    }

    .result { margin-top: 2.5rem; opacity: 0; transform: translateY(12px); transition: all 0.4s ease; }
    .result.visible { opacity: 1; transform: translateY(0); }

    .playlist-header { margin-bottom: 1.25rem; }
    .playlist-name {
      font-size: 20px; font-weight: 800; letter-spacing: -0.02em; color: var(--text);
    }
    .playlist-sub {
      font-size: 13px; color: var(--text-muted); margin-top: 3px;
      font-family: 'DM Mono', monospace; font-weight: 300;
    }
    .playlist-desc {
      margin-top: 8px; font-size: 13px; color: var(--text-muted);
      font-style: italic;
    }

    .tracks { border-top: 1px solid var(--border); margin-top: 1rem; }
    .track {
      display: grid; grid-template-columns: 28px 1fr auto;
      align-items: center; gap: 12px;
      padding: 11px 0; border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .track:hover { background: rgba(255,255,255,0.02); }
    .track-num {
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--text-dim); text-align: center;
    }
    .track-info {}
    .track-title { font-size: 14px; font-weight: 500; color: var(--text); }
    .track-artist { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .track-dur {
      font-family: 'DM Mono', monospace; font-size: 12px;
      color: var(--text-dim); white-space: nowrap;
    }

    .actions { display: flex; gap: 8px; margin-top: 1.25rem; }
    .action-btn {
      padding: 8px 16px; border-radius: 999px;
      border: 1px solid var(--border);
      font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 500;
      color: var(--text-muted); background: transparent; cursor: pointer;
      transition: all 0.15s;
    }
    .action-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .action-btn.copied { border-color: var(--accent); color: var(--accent); }

    .loader {
      display: flex; align-items: center; gap: 12px;
      padding: 1.5rem 0; color: var(--text-muted); font-size: 13px;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 1.5px solid var(--border-hover);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.65s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { color: #f87171; font-size: 13px; padding: 1rem 0; }

    footer {
      margin-top: 4rem; text-align: center;
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--text-dim); letter-spacing: 0.06em;
    }
    footer a { color: var(--text-dim); text-decoration: none; }
    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>
<div class="noise"></div>
<div class="container">
  <header>
    <p class="eyebrow">AI-powered curation</p>
    <h1>Playlist<br><span>Recommender</span></h1>
    <p class="tagline">Pick an occasion and vibe — get a curated tracklist instantly.</p>
  </header>

  <div class="section">
    <p class="section-label">Occasion</p>
    <div class="chips" id="occasion-chips">
      <button class="chip" data-val="wedding reception">Wedding / Reception</button>
      <button class="chip" data-val="birthday party">Birthday Party</button>
      <button class="chip" data-val="road trip">Road Trip</button>
      <button class="chip" data-val="dinner party">Dinner / House Party</button>
      <button class="chip" data-val="workout session">Workout</button>
      <button class="chip" data-val="study session">Study / Focus</button>
      <button class="chip" data-val="late night chill">Late Night Chill</button>
      <button class="chip" data-val="morning routine">Morning Routine</button>
    </div>
  </div>

  <div class="section">
    <p class="section-label">Vibe</p>
    <div class="chips" id="vibe-chips">
      <button class="chip" data-val="high energy and upbeat">High Energy</button>
      <button class="chip" data-val="chill and relaxed">Chill</button>
      <button class="chip" data-val="romantic and intimate">Romantic</button>
      <button class="chip" data-val="nostalgic and sentimental">Nostalgic</button>
      <button class="chip" data-val="happy and feel-good">Feel-Good</button>
      <button class="chip" data-val="dark and moody">Moody</button>
      <button class="chip" data-val="epic and cinematic">Epic / Cinematic</button>
    </div>
  </div>

  <div class="section">
    <p class="section-label">Playlist length</p>
    <div class="chips" id="duration-chips">
      <button class="chip" data-val="10">Quick — 10 songs</button>
      <button class="chip" data-val="15">Medium — 15 songs</button>
      <button class="chip" data-val="20">Long — 20 songs</button>
    </div>
  </div>

  <button class="gen-btn" id="gen-btn" disabled onclick="generate()">Generate playlist</button>

  <div class="result" id="result"></div>

  <footer>
    Built by <a href="https://linkedin.com/in/swastiknanda" target="_blank">Swastik Ranjan Nanda</a>
    &nbsp;·&nbsp; Powered by Claude API
  </footer>
</div>

<script>
  // ── Config ──────────────────────────────────────────────
  // Point this to your Render backend URL after deployment.
  // During local dev, use: http://localhost:8000
  const API_BASE = "http://localhost:8000";

  // ── State ───────────────────────────────────────────────
  let occasion = null, vibe = null, duration = null;
  let currentPlaylist = null;

  // ── Chip setup ──────────────────────────────────────────
  function setupChips(groupId, setter) {
    const group = document.getElementById(groupId);
    group.querySelectorAll(".chip").forEach(chip => {
      chip.addEventListener("click", () => {
        group.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
        setter(chip.dataset.val);
        checkReady();
      });
    });
  }

  setupChips("occasion-chips", v => occasion = v);
  setupChips("vibe-chips", v => vibe = v);
  setupChips("duration-chips", v => duration = parseInt(v));

  function checkReady() {
    document.getElementById("gen-btn").disabled = !(occasion && vibe && duration);
  }

  // ── Generate ─────────────────────────────────────────────
  async function generate() {
    const btn = document.getElementById("gen-btn");
    const area = document.getElementById("result");

    btn.disabled = true;
    area.classList.remove("visible");
    area.innerHTML = `<div class="loader"><div class="spinner"></div><span>Curating your playlist…</span></div>`;
    setTimeout(() => area.classList.add("visible"), 10);

    try {
      const res = await fetch(`${API_BASE}/generate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ occasion, vibe, duration }),
      });

      if (!res.ok) throw new Error(`API error: ${res.status}`);
      const pl = await res.json();
      currentPlaylist = pl;
      renderPlaylist(pl);
    } catch (err) {
      area.innerHTML = `<p class="error-msg">Something went wrong. Is the backend running? (${err.message})</p>`;
    }

    btn.disabled = false;
  }

  // ── Render playlist ──────────────────────────────────────
  function renderPlaylist(pl) {
    const area = document.getElementById("result");
    const totalSecs = pl.tracks.reduce((acc, t) => {
      const [m, s] = t.duration.split(":").map(Number);
      return acc + m * 60 + s;
    }, 0);
    const hrs = Math.floor(totalSecs / 3600);
    const mins = Math.floor((totalSecs % 3600) / 60);
    const timeStr = hrs > 0 ? `${hrs}h ${mins}m` : `${mins} min`;

    area.classList.remove("visible");
    area.innerHTML = `
      <div class="playlist-header">
        <p class="playlist-name">${escHtml(pl.name)}</p>
        <p class="playlist-sub">${pl.tracks.length} tracks · ${timeStr} · ${occasion} · ${vibe}</p>
        <p class="playlist-desc">${escHtml(pl.description)}</p>
      </div>
      <div class="tracks">
        ${pl.tracks.map((t, i) => `
          <div class="track">
            <span class="track-num">${i + 1}</span>
            <div class="track-info">
              <p class="track-title">${escHtml(t.title)}</p>
              <p class="track-artist">${escHtml(t.artist)}</p>
            </div>
            <span class="track-dur">${escHtml(t.duration)}</span>
          </div>
        `).join("")}
      </div>
      <div class="actions">
        <button class="action-btn" id="copy-btn" onclick="copyPlaylist()">Copy tracklist</button>
        <button class="action-btn" onclick="generate()">Regenerate</button>
      </div>
    `;
    requestAnimationFrame(() => area.classList.add("visible"));
  }

  function copyPlaylist() {
    if (!currentPlaylist) return;
    const pl = currentPlaylist;
    const text = `${pl.name}\n${pl.description}\n\n` +
      pl.tracks.map((t, i) => `${i + 1}. ${t.title} — ${t.artist} (${t.duration})`).join("\n");
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById("copy-btn");
      btn.textContent = "Copied!";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = "Copy tracklist"; btn.classList.remove("copied"); }, 2000);
    });
  }

  function escHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
</script>
</body>
</html>
